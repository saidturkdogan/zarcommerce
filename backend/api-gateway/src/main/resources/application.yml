server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**
        
        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/products/**, /api/v1/categories/**
            
        - id: cart-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/cart/**
            
        - id: order-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/orders/**, /api/v1/payments/**
            
        - id: recommendation-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/recommendations/**

management:
  endpoints:
    web:
      exposure:
        include: "*"
