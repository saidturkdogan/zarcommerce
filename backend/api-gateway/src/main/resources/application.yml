server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: user-auth-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/v1/auth/**

        - id: user-wishlist-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/v1/wishlist,/api/v1/wishlist/**

        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/v1/users/**
        
        - id: product-service
          uri: http://product-service:8082
          predicates:
            - Path=/api/v1/products,/api/v1/products/**,/api/v1/categories,/api/v1/categories/**
            
        - id: cart-service
          uri: http://cart-service:8083
          predicates:
            - Path=/api/v1/cart/**
            
        - id: order-service
          uri: http://order-service:8084
          predicates:
            - Path=/api/v1/orders/**,/api/v1/payments/**
            
        - id: recommendation-service
          uri: http://recommendation-service:8085
          predicates:
            - Path=/api/v1/recommendations/**

management:
  endpoints:
    web:
      exposure:
        include: "*"
