<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${status != null ? status + ' — ZarCommerce API' : 'Hata — ZarCommerce API'}">Hata</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 36rem; margin: 3rem auto; padding: 0 1rem; color: #1a1a1a; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .meta { color: #666; font-size: 0.875rem; margin: 1rem 0; }
    code { background: #f4f4f5; padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.85rem; }
    a { color: #4f46e5; }
  </style>
</head>
<body>
  <h1 th:text="${status != null ? status + ' ' + error : 'Beklenmeyen hata'}">404 Not Found</h1>
  <p th:if="${message != null and !#strings.isEmpty(message)}" th:text="${message}">Açıklama</p>
  <div class="meta">
    <div th:if="${path != null}">Yol: <code th:text="${path}">/path</code></div>
    <div th:if="${timestamp != null}">Zaman: <span th:text="${timestamp}">—</span></div>
  </div>
  <p><a href="/actuator/health">Sağlık kontrolü</a> · API kökü: <code>/api/v1/…</code></p>
</body>
</html>
