# Runs backend Maven tests on push and pull requests when backend or this workflow changes.
name: Backend tests

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"

permissions:
  contents: read

concurrency:
  group: backend-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: backend/**/pom.xml

      - name: Install Maven
        run: sudo apt-get update && sudo apt-get install -y maven

      - name: Run tests (all modules)
        working-directory: backend
        run: mvn -B -ntp test
